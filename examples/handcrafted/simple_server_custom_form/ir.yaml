# Simple Server Custom Form — compact IR.
# Compile: node ../mcbejsonuimasterAI/tools/run.mjs ir.yaml

screen: simple_server_custom_form
namespace: ssc_form
base_resolution: [1920, 1080]

elements:
  - { id: frame, kind: panel, extends: common_dialogs.main_panel_no_buttons,
      anchor: center, size: [840, 624],
      variables: { $title_panel: ssc_form.title_block,
                   $child_control: ssc_form.body,
                   $title_size: ["100% - 24px", 64],
                   $title_max_size: ["100% - 24px", 64],
                   $text_name: "#title_text",
                   $title_text_binding_type: none },
      bindings: [ { binding_name: "#title_text" } ] }

  - { id: btn_help,  kind: button, anchor: top_right, pos: [-72, -56], size: [40, 40],
      props: { $pressed_button_name: button.help } }
  - { id: btn_close, kind: button, anchor: top_right, pos: [-24, -56], size: [40, 40],
      props: { $pressed_button_name: button.close } }

  - { id: title_block, parent: frame, pos: [16, 12], size: [600, 64] }
  - { id: title_label, parent: title_block, kind: label, size: [600, 32],
      props: { text: "Simple Server Custom From", font_size: large } }
  - { id: title_desc,  parent: title_block, kind: label, pos: [0, 36], size: [600, 20],
      props: { text: "Description Text!", color: [0.7, 0.7, 0.7] } }

  - { id: body, parent: frame, pos: [16, 96], size: [792, 512] }

  - { id: section1, parent: body, size: [792, 360], props: { $background_alpha: 1.0 } }
  - { id: btn1, parent: section1, kind: button, pos: [8, 8],     size: [388, 344],
      variables: { $button_text: Btn1 }, props: { $pressed_button_name: button.btn1 } }
  - { id: btn2, parent: section1, kind: button, pos: [404, 8],   size: [380, 168],
      variables: { $button_text: Btn2 }, props: { $pressed_button_name: button.btn2 } }
  - { id: btn3, parent: section1, kind: button, pos: [404, 184], size: [186, 168],
      variables: { $button_text: Btn3 }, props: { $pressed_button_name: button.btn3 } }
  - { id: btn4, parent: section1, kind: button, pos: [598, 184], size: [186, 168],
      variables: { $button_text: Btn4 }, props: { $pressed_button_name: button.btn4 } }

  - { id: section2, parent: body, pos: [0, 372], size: [792, 140] }
  - { id: lb_title, parent: section2, kind: label, pos: [8, 8],  size: [600, 32],
      props: { text: "Leaderboard", font_size: large } }
  - { id: lb_desc,  parent: section2, kind: label, pos: [8, 44], size: [600, 20],
      props: { text: "Description Text!", color: [0.7, 0.7, 0.7] } }

  - { id: scrollbar_track, parent: frame, anchor: top_right, pos: [-8, 96], size: [8, 512],
      props: { $background_alpha: 0.6 } }
  - { id: scrollbar_thumb, parent: scrollbar_track, size: [8, 220],
      props: { $background_alpha: 1.0 } }

constraints:
  - { op: same_size, ids: [btn3, btn4] }
  - { op: same_size, ids: [btn_help, btn_close] }
