name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
      - name: Install (no optional native deps)
        run: npm install --no-fund --no-audit --omit=optional
      - name: Setup (vanilla index, env check)
        run: node tools/setup.mjs
      - name: Doctor (quick)
        run: node tools/doctor.mjs --quick
      - name: Test suite
        run: npm test
